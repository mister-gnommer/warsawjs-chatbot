services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: warsawjs
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-warsawjs}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
